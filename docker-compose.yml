services:
  sql_agent:
    build: .
    container_name: sql_agent
    restart: unless-stopped
    ports:
      - "8081:8081"
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - .:/app

    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sqlagent.rule=Host(`sqlagent.docker.localhost`)"
      - "traefik.http.routers.sqlagent.entrypoints=websecure"
      - "traefik.http.routers.sqlagent.tls=true"
      - "traefik.http.services.sqlagent.loadbalancer.server.port=8081"
      - "traefik.http.services.sqlagent.loadbalancer.server.port=8501"

networks:
  proxy:
    name: proxy
    external: true